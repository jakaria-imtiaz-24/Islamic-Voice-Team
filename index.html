<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>যোগাযোগ তালিকা</title>
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Exo+2:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07101e;--ph:#0d1625;--sf:#131f32;--sf2:#1a2a40;
  --bd:rgba(255,255,255,.07);--ac:#22d3a5;--ac2:#3b82f6;
  --wa:#25D366;--dl:#ef4444;--tx:#eaf4ff;--st:#5e7d99;--mt:#1e2f44;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:'Hind Siliguri',sans-serif;color:var(--tx);background:var(--bg)}
body{display:flex;align-items:flex-start;justify-content:center;overflow-x:hidden}

.shell{width:100%;max-width:420px;min-height:100vh;background:var(--ph);display:flex;flex-direction:column}
@media(min-width:460px){
  body{align-items:center;padding:28px 0;background:radial-gradient(ellipse at 25% 20%,#0d1f3e,#07101e 70%)}
  .shell{min-height:auto;max-height:92vh;border-radius:46px;
    box-shadow:0 0 0 8px #111c2e,0 0 0 10px #08111f,0 50px 90px rgba(0,0,0,.75);
    border:1px solid rgba(255,255,255,.05);overflow:hidden}
  .notchrow{display:flex;justify-content:center;padding:10px 0 4px}
  .notch{width:110px;height:26px;background:#06111d;border-radius:0 0 16px 16px;display:flex;align-items:center;justify-content:center;gap:7px}
  .ndot{width:9px;height:9px;background:#1a2637;border-radius:50%;border:2px solid #06111d}
  .nbar{width:42px;height:4px;background:#1a2637;border-radius:4px}
}
@media(max-width:459px){.notchrow{display:none}}

.scroller{flex:1;overflow-y:auto;scrollbar-width:none}
.scroller::-webkit-scrollbar{display:none}

/* Status */
.status{display:flex;justify-content:space-between;align-items:center;padding:8px 22px 2px;font-family:'Exo 2',sans-serif;font-size:.7rem;font-weight:700;color:var(--st);letter-spacing:.5px}

/* Header */
.hdr{padding:8px 20px 14px}
.hdrtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.title{font-family:'Exo 2',sans-serif;font-size:1.55rem;font-weight:900;letter-spacing:-.5px;line-height:1}
.title em{color:var(--ac);font-style:normal}
.pill{background:rgba(34,211,165,.12);border:1px solid rgba(34,211,165,.22);color:var(--ac);font-size:.7rem;font-weight:700;padding:4px 12px;border-radius:20px;font-family:'Exo 2',sans-serif}

/* Clock */
.clockbar{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border:1px solid var(--bd);border-radius:14px;padding:10px 16px;margin-bottom:14px}
.bigtime{font-family:'Exo 2',sans-serif;font-size:1.65rem;font-weight:900;color:var(--tx);letter-spacing:2px;line-height:1}
.colon{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.clkr{text-align:right}
.clkdate{font-size:.78rem;color:var(--st);line-height:1.4}
.clkday{font-size:.7rem;color:var(--ac);font-weight:600;margin-top:2px}

/* Search */
.srchwrap{position:relative;margin-bottom:4px}
.srchwrap input{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:13px;padding:11px 42px 11px 42px;color:var(--tx);font-family:'Hind Siliguri',sans-serif;font-size:.93rem;outline:none;transition:border-color .2s;caret-color:var(--ac)}
.srchwrap input:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(34,211,165,.1)}
.srchwrap input::placeholder{color:var(--st);font-size:.85rem}
.sico,.sclr{position:absolute;top:50%;transform:translateY(-50%);font-size:.9rem;color:var(--st)}
.sico{left:14px;pointer-events:none}
.sclr{right:12px;cursor:pointer;display:none;background:var(--mt);border-radius:50%;width:20px;height:20px;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
.sclr.on{display:flex}

/* Section label */
.slbl{font-size:.7rem;font-weight:600;color:var(--st);letter-spacing:1px;text-transform:uppercase;padding:12px 20px 6px}

/* Prayer */
.ptitle{font-size:.7rem;font-weight:600;color:var(--st);letter-spacing:1px;text-transform:uppercase;padding:14px 20px 8px}
.pgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 12px 4px}
.pc{background:var(--sf);border:1px solid var(--bd);border-radius:12px;padding:8px 4px;text-align:center;position:relative;overflow:hidden;transition:background .2s,border-color .2s}
.pc.act{background:rgba(34,211,165,.1);border-color:rgba(34,211,165,.35)}
.pc.act::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--ac)}
.pico{font-size:1rem;margin-bottom:3px}
.pnm{font-size:.58rem;font-weight:700;color:var(--st);letter-spacing:.3px;margin-bottom:4px;font-family:'Exo 2',sans-serif}
.ptm{font-size:.68rem;font-weight:700;color:var(--tx);font-family:'Exo 2',sans-serif;line-height:1}
.ptm.ld{color:var(--st);font-size:.58rem}
.pc.act .pnm{color:var(--ac)}
.pc.act .ptm{color:var(--ac)}

/* Contact list */
.listpad{padding:0 12px}
.ci{display:flex;align-items:center;gap:10px;padding:10px;border-radius:14px;margin-bottom:6px;background:var(--sf);border:1px solid var(--bd);animation:fup .3s ease both;position:relative}
@keyframes fup{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.sn{font-size:.62rem;font-family:'Exo 2',sans-serif;font-weight:700;color:var(--st);min-width:16px;text-align:right}
.av{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;color:#fff;flex-shrink:0;font-family:'Exo 2',sans-serif}
.av0{background:linear-gradient(135deg,#6366f1,#8b5cf6)}
.av1{background:linear-gradient(135deg,#0ea5e9,#22d3a5)}
.av2{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.av3{background:linear-gradient(135deg,#ec4899,#8b5cf6)}
.av4{background:linear-gradient(135deg,#10b981,#0ea5e9)}
.av5{background:linear-gradient(135deg,#f97316,#fbbf24)}
.av6{background:linear-gradient(135deg,#14b8a6,#6366f1)}
.av7{background:linear-gradient(135deg,#e11d48,#f97316)}
.inf{flex:1;min-width:0}
.cn{font-size:.9rem;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.cnum{font-size:.8rem;color:#60a5fa;margin-top:3px;font-family:'Exo 2',sans-serif;font-weight:600;letter-spacing:.3px}
.acts{display:flex;gap:6px;flex-shrink:0}
.ba{width:33px;height:33px;border-radius:9px;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:.85rem;transition:transform .1s;text-decoration:none}
.ba:active{transform:scale(.87)}
.bacall{background:rgba(59,130,246,.15);color:#60a5fa}
.bawa{background:rgba(37,211,102,.15);color:#4ade80}
.badel{background:rgba(239,68,68,.1);color:#f87171}
.newtag{position:absolute;top:-2px;right:-2px;background:var(--ac);color:#07101e;font-size:.45rem;font-weight:900;padding:1px 4px;border-radius:3px;font-family:'Exo 2',sans-serif}
.nores{text-align:center;padding:40px 20px;color:var(--st);font-size:.88rem;display:none}
.nores .ico{font-size:2.2rem;margin-bottom:8px}

/* Bottom bar */
.btm{padding:10px 18px 12px;border-top:1px solid var(--bd);background:var(--ph);display:flex;align-items:center;gap:10px;position:sticky;bottom:0}
.bstat{font-size:.78rem;color:var(--st);flex:1}
.bstat strong{color:var(--ac);font-family:'Exo 2',sans-serif}
.fab{background:linear-gradient(135deg,#22d3a5,#0ea5e9);border:none;border-radius:13px;padding:10px 16px;color:#07101e;font-weight:700;font-family:'Hind Siliguri',sans-serif;font-size:.85rem;cursor:pointer;display:flex;align-items:center;gap:5px;box-shadow:0 4px 16px rgba(34,211,165,.3);transition:transform .15s;white-space:nowrap}
.fab:active{transform:scale(.95)}

/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);z-index:100;display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s}
.ov.open{opacity:1;pointer-events:all}
.sh{width:100%;max-width:420px;background:#0f1e30;border-radius:28px 28px 0 0;padding:22px 20px 34px;transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);border:1px solid var(--bd);border-bottom:none}
.ov.open .sh{transform:translateY(0)}
.hdl{width:38px;height:4px;background:var(--mt);border-radius:4px;margin:0 auto 18px}
.mtit{font-family:'Exo 2',sans-serif;font-size:1.15rem;font-weight:800;color:var(--tx);margin-bottom:16px}
.mtit em{color:var(--ac);font-style:normal}
.fg{display:flex;flex-direction:column;gap:11px}
.flbl{font-size:.72rem;color:var(--st);font-weight:600;letter-spacing:.8px;text-transform:uppercase;margin-bottom:4px}
.fi{width:100%;background:var(--sf);border:1.5px solid var(--bd);border-radius:11px;padding:11px 14px;color:var(--tx);font-family:'Hind Siliguri',sans-serif;font-size:.93rem;outline:none;transition:border-color .2s;caret-color:var(--ac)}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(34,211,165,.1)}
.fi::placeholder{color:var(--st)}
.fi.err{border-color:var(--dl);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.mac{display:flex;gap:10px;margin-top:18px}
.mcan{flex:1;padding:12px;background:var(--sf);border:1.5px solid var(--bd);border-radius:12px;color:var(--st);font-family:'Hind Siliguri',sans-serif;font-size:.92rem;font-weight:600;cursor:pointer}
.msav{flex:2;padding:12px;background:linear-gradient(135deg,#22d3a5,#0ea5e9);border:none;border-radius:12px;color:#07101e;font-family:'Hind Siliguri',sans-serif;font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(34,211,165,.28);transition:transform .1s}
.msav:active{transform:scale(.97)}

/* Toast */
.toast{position:fixed;bottom:85px;left:50%;transform:translateX(-50%) translateY(16px);background:#0e2e1f;border:1px solid rgba(34,211,165,.3);color:var(--ac);font-size:.82rem;font-weight:600;padding:9px 18px;border-radius:30px;z-index:200;opacity:0;transition:opacity .25s,transform .25s;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>
<div class="shell">
  <div class="notchrow">
    <div class="notch"><div class="nbar"></div><div class="ndot"></div></div>
  </div>
  <div class="status">
    <span id="stclk">9:41</span><span>📶 🔋</span>
  </div>

  <div class="hdr">
    <div class="hdrtop">
      <div class="title">যোগাযোগ<em>.</em></div>
      <div class="pill" id="totpill">২০ জন</div>
    </div>
    <div class="clockbar">
      <div class="bigtime" id="bigclk">--<span class="colon">:</span>--</div>
      <div class="clkr">
        <div class="clkdate" id="clkdate">লোড হচ্ছে…</div>
        <div class="clkday" id="clkday"></div>
      </div>
    </div>
    <div class="srchwrap">
      <span class="sico">🔍</span>
      <input type="text" id="srch" placeholder="নাম বা নাম্বার খুঁজুন…" oninput="onSearch(this.value)">
      <span class="sclr" id="sclr" onclick="clearSrch()">✕</span>
    </div>
  </div>

  <div class="scroller">
    <!-- Prayer -->
    <div class="ptitle">🕌 নামাজের সময়সূচি — বরিশাল</div>
    <div class="pgrid">
      <div class="pc" id="pc0"><div class="pico">🌅</div><div class="pnm">ফজর</div><div class="ptm ld" id="pt0">…</div></div>
      <div class="pc" id="pc1"><div class="pico">☀️</div><div class="pnm">যোহর</div><div class="ptm ld" id="pt1">…</div></div>
      <div class="pc" id="pc2"><div class="pico">🌤️</div><div class="pnm">আসর</div><div class="ptm ld" id="pt2">…</div></div>
      <div class="pc" id="pc3"><div class="pico">🌇</div><div class="pnm">মাগরিব</div><div class="ptm ld" id="pt3">…</div></div>
      <div class="pc" id="pc4"><div class="pico">🌙</div><div class="pnm">এশা</div><div class="ptm ld" id="pt4">…</div></div>
    </div>

    <!-- Contacts -->
    <div class="slbl" id="slbl">সকল পরিচিত</div>
    <div class="listpad" id="lpad">
      <div class="nores" id="nores"><div class="ico">🔎</div><div>কোনো ফলাফল নেই</div></div>
    </div>
  </div>

  <div class="btm">
    <div class="bstat">মোট <strong id="viscnt">২০</strong> জন</div>
    <button class="fab" onclick="openModal()">＋ নাম্বার যোগ করুন</button>
  </div>
</div>

<div class="ov" id="ov" onclick="bgcl(event)">
  <div class="sh">
    <div class="hdl"></div>
    <div class="mtit">নতুন <em>নাম্বার</em> যোগ করুন</div>
    <div class="fg">
      <div><div class="flbl">নাম</div><input class="fi" id="iname" placeholder="যেমন: রহিম সাহেব" type="text"></div>
      <div><div class="flbl">মোবাইল নাম্বার</div><input class="fi" id="inum" placeholder="01XXXXXXXXX" type="tel"></div>
    </div>
    <div class="mac">
      <button class="mcan" onclick="closeModal()">বাতিল</button>
      <button class="msav" onclick="saveContact()">✓ সেভ করুন</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─── Contacts ───
var PRESET=[
  {name:"বাকাবিল্লাহ ইমাম",     number:"01779937436"},
  {name:"বেল্লাল ভাই জামায়াত",     number:"01828091382"},
  {name:"রহিম মোল্লা",     number:"01715619146"},
  {name:"জব্বার ফকির",      number:"01706173449"},
  {name:"মতলেব নাজির",       number:"01742793242"},
  {name:"আলতাফ ",      number:"01731813607"},
  {name:"আল আমিন",       number:"01746306099"},
  {name:"দুলাল",   number:"01716114179"},
  {name:"ছগির খা",         number:"01777407663"},
  {name:"কালু গরামি",   number:"01712232501"},
  {name:"জাকারিয়া",    number:"01792725543"},
  {name:"জাকারিয়া",    number:"+8809638034072"},
  {name:"সেকান্দার",       number:""},
  {name:"বাবুল ফহকির",    number:""},
  {name:"জাহাঙ্গির আলাদার",   number:"01724000014"}, 

];
var SK="ecv3";
function ldx(){try{return JSON.parse(localStorage.getItem(SK))||[];}catch(e){return[];}}
function svx(a){localStorage.setItem(SK,JSON.stringify(a));}
var extra=ldx();
function allC(){return PRESET.concat(extra);}

// ─── Bengali digits ───
var BD=["০","১","২","৩","৪","৫","৬","৭","৮","৯"];
function bn(s){return String(s).replace(/[0-9]/g,function(d){return BD[+d];});}
function fmt12(h,m){
  var ap=h<12?"AM":"PM";
  var h12=h%12===0?12:h%12;
  return bn(h12)+":"+(m<10?bn(0):"")+bn(m)+" "+ap;
}

// ─── Clock ───
var DAYS=["রবিবার","সোমবার","মঙ্গলবার","বুধবার","বৃহস্পতিবার","শুক্রবার","শনিবার"];
var MONS=["জানুয়ারি","ফেব্রুয়ারি","মার্চ","এপ্রিল","মে","জুন","জুলাই","আগস্ট","সেপ্টেম্বর","অক্টোবর","নভেম্বর","ডিসেম্বর"];
function tick(){
  var n=new Date();
  var h=n.getHours(),m=n.getMinutes();
  var h12=h%12===0?12:h%12;
  var ap=h<12?"AM":"PM";
  var hh=(h12<10?"0":"")+h12, mm=(m<10?"0":"")+m;
  document.getElementById("bigclk").innerHTML=bn(hh)+'<span class="colon">:</span>'+bn(mm)+' <span style="font-size:.9rem;color:var(--ac);letter-spacing:1px">'+ap+'</span>';
  document.getElementById("stclk").textContent=hh+":"+mm+" "+ap;
  document.getElementById("clkdate").textContent=bn(n.getDate())+" "+MONS[n.getMonth()]+", "+bn(n.getFullYear());
  document.getElementById("clkday").textContent=DAYS[n.getDay()];
  if(n.getSeconds()===0) hlPrayer();
}
setInterval(tick,1000); tick();

// ─── Prayer ───
var ptimes=null;
function ldPrayer(){
  var n=new Date();
  var url="https://api.aladhan.com/v1/timings/"+n.getDate()+"-"+(n.getMonth()+1)+"-"+n.getFullYear()+"?latitude=22.701&longitude=90.3535&method=1";
  fetch(url).then(function(r){return r.json();}).then(function(d){
    if(d.code===200){
      var t=d.data.timings;
      ptimes=[t.Fajr,t.Dhuhr,t.Asr,t.Maghrib,t.Isha];
      ptimes.forEach(function(tv,i){
        var p=tv.split(":");
        var ph=parseInt(p[0]),pm=parseInt(p[1]);
        var el=document.getElementById("pt"+i);
        el.textContent=fmt12(ph,pm);
        el.classList.remove("ld");
      });
      hlPrayer();
    }
  }).catch(function(){
    for(var i=0;i<5;i++){
      var el=document.getElementById("pt"+i);
      el.textContent="N/A"; el.classList.remove("ld");
    }
  });
}
function hlPrayer(){
  if(!ptimes) return;
  var n=new Date(), now=n.getHours()*60+n.getMinutes();
  var mins=ptimes.map(function(tv){var p=tv.split(":");return parseInt(p[0])*60+parseInt(p[1]);});
  var act=4;
  for(var i=0;i<mins.length;i++){if(now>=mins[i])act=i;}
  if(now<mins[0]) act=4;
  for(var j=0;j<5;j++) document.getElementById("pc"+j).classList.toggle("act",j===act);
}
ldPrayer();

// ─── Render ───
function avc(name){var h=0;for(var i=0;i<name.length;i++){h=(h*31+name.charCodeAt(i))&0xffff;}return"av"+(h%8);}
function inits(name){var ws=name.trim().split(" ");var r="";for(var i=0;i<Math.min(2,ws.length);i++){r+=ws[i][0]||"";}return r.toUpperCase()||"?";}

function render(list){
  var pad=document.getElementById("lpad");
  var nores=document.getElementById("nores");
  var visel=document.getElementById("viscnt");
  var totel=document.getElementById("totpill");
  var slbl=document.getElementById("slbl");
  var ac=allC();

  totel.textContent=bn(ac.length)+" জন";
  visel.textContent=bn(list.length);
  slbl.textContent=list.length===ac.length?"সকল পরিচিত":"ফলাফল — "+bn(list.length)+" টি";

  var old=pad.querySelectorAll(".ci");
  for(var i=0;i<old.length;i++) old[i].remove();
  nores.style.display=list.length?"none":"block";

  for(var i=0;i<list.length;i++){
    var c=list[i];
    var isU=PRESET.indexOf(c)===-1;
    var xi=extra.indexOf(c);
    var wa="88"+c.number.replace(/^0/,"");
    var card=document.createElement("div");
    card.className="ci";
    card.style.animationDelay=Math.min(i*0.025,0.35)+"s";
    card.innerHTML=
      '<span class="sn">'+bn(i+1)+'</span>'+
      '<div class="av '+avc(c.name)+'">'+inits(c.name)+'</div>'+
      '<div class="inf">'+
        '<div class="cn">'+c.name+'</div>'+
        '<div class="cnum">'+c.number+'</div>'+
      '</div>'+
      '<div class="acts">'+
        '<a class="ba bacall" href="tel:'+c.number+'" title="কল">📞</a>'+
        '<a class="ba bawa" href="https://wa.me/'+wa+'" target="_blank" title="WhatsApp">💬</a>'+
        (isU?'<button class="ba badel" onclick="delC('+xi+')" title="মুছুন">🗑</button>':'')+
      '</div>'+
      (isU?'<div class="newtag">NEW</div>':'');
    pad.appendChild(card);
  }
}

function refrAll(){render(allC());}

// ─── Search ───
function onSearch(v){
  var q=v.trim().toLowerCase();
  document.getElementById("sclr").classList.toggle("on",q.length>0);
  if(!q){render(allC());return;}
  render(allC().filter(function(c){return c.name.toLowerCase().indexOf(q)>-1||c.number.indexOf(q)>-1;}));
}
function clearSrch(){
  document.getElementById("srch").value="";
  document.getElementById("sclr").classList.remove("on");
  refrAll();
}

// ─── Modal ───
function openModal(){
  document.getElementById("iname").value="";
  document.getElementById("inum").value="";
  document.getElementById("iname").classList.remove("err");
  document.getElementById("inum").classList.remove("err");
  document.getElementById("ov").classList.add("open");
  setTimeout(function(){document.getElementById("iname").focus();},350);
}
function closeModal(){document.getElementById("ov").classList.remove("open");}
function bgcl(e){if(e.target===document.getElementById("ov"))closeModal();}
function saveContact(){
  var name=document.getElementById("iname").value.trim();
  var num=document.getElementById("inum").value.trim();
  var ok=true;
  if(!name){document.getElementById("iname").classList.add("err");ok=false;}
  else document.getElementById("iname").classList.remove("err");
  if(!num||!/^01[3-9]\d{8}$/.test(num)){document.getElementById("inum").classList.add("err");ok=false;}
  else document.getElementById("inum").classList.remove("err");
  if(!ok) return;
  extra.push({name:name,number:num});
  svx(extra); closeModal(); clearSrch(); showT("✓ নাম্বার সেভ হয়েছে!");
}
function delC(idx){
  if(idx<0) return;
  extra.splice(idx,1); svx(extra); clearSrch(); showT("নাম্বার মুছে ফেলা হয়েছে");
}

// ─── Toast ───
var tT;
function showT(msg){
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("on");
  clearTimeout(tT); tT=setTimeout(function(){el.classList.remove("on");},2500);
}

refrAll();
</script>
</body>
</html>
