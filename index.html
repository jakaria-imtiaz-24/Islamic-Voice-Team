<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>যোগাযোগ</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0d1117;
    --card:     #161b22;
    --card2:    #1a2030;
    --border:   #21262d;
    --accent:   #00d4aa;
    --text:     #e6edf3;
    --sub:      #7d8590;
    --phone:    #58a6ff;
    --call-bg:  #1e3a2f;
    --wa-bg:    #0d2d47;
    --radius:   16px;
  }

  body {
    font-family: 'Hind Siliguri', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0 0 110px;
  }

  .app { width: 100%; max-width: 480px; }

  /* Hero */
  .hero { text-align: center; padding: 44px 24px 20px; position: relative; }
  .hero-glow {
    position: absolute; top: 18px; left: 50%;
    transform: translateX(-50%);
    width: 280px; height: 90px;
    background: radial-gradient(ellipse at center,
      rgba(0,212,170,.30) 0%, rgba(0,212,170,.12) 50%, transparent 80%);
    filter: blur(20px);
    pointer-events: none;
  }
  .hero h1 {
    font-size: 2.5rem; font-weight: 700; letter-spacing: 3px;
    background: linear-gradient(135deg, #e6edf3 30%, #00d4aa 100%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; position: relative; z-index: 1;
  }
  .hero-dot {
    display: inline-block; width: 10px; height: 10px;
    background: var(--accent); border-radius: 50%;
    margin-left: 5px; vertical-align: middle;
    position: relative; top: -5px;
    box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 8px var(--accent); }
    50%      { box-shadow: 0 0 22px var(--accent), 0 0 44px rgba(0,212,170,.3); }
  }

  /* Time bar */
  .time-bar {
    margin: 0 14px 14px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 14px 18px;
    display: flex; align-items: center; justify-content: space-between;
  }
  #clockDisplay {
    font-size: 2rem; font-weight: 700; letter-spacing: 2px; color: var(--text);
  }
  #clockDisplay .ampm { color: var(--accent); font-size: 1rem; font-weight: 500; margin-left: 6px; }
  .date-info { text-align: right; }
  .date-info .dt  { font-size: .82rem; color: var(--sub); }
  .date-info .day { font-size: .9rem;  color: var(--accent); font-weight: 600; }

  /* Search */
  .search-wrap { margin: 0 14px 18px; position: relative; }
  .search-wrap input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 50px; padding: 11px 18px 11px 46px;
    font-family: 'Hind Siliguri', sans-serif; font-size: .93rem;
    color: var(--text); outline: none; transition: border-color .2s;
  }
  .search-wrap input::placeholder { color: var(--sub); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon {
    position: absolute; left: 15px; top: 50%;
    transform: translateY(-50%); color: var(--sub);
  }

  /* Section label */
  .section-label {
    padding: 0 18px 8px; font-size: .78rem; color: var(--sub);
    letter-spacing: 1.5px; text-transform: uppercase;
  }

  /* Contact list */
  .contact-list { padding: 0 10px; }

  .contact-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); margin-bottom: 8px;
    display: flex; align-items: center;
    padding: 11px 11px; gap: 10px;
    transition: background .18s, border-color .18s;
  }
  .contact-card:hover { background: var(--card2); border-color: #30363d; }
  .contact-card.user-added { border-left: 3px solid var(--accent); cursor: pointer; }
  .contact-card.user-added:hover { border-color: var(--accent); background: var(--card2); }

  .serial {
    font-size: .78rem; font-weight: 700; color: #a0aab4;
    min-width: 20px; text-align: center;
  }

  .avatar {
    width: 46px; height: 46px; border-radius: 13px;
    display: flex; align-items: center; justify-content: center;
    font-size: .88rem; font-weight: 700; color: #fff; flex-shrink: 0;
  }

  .contact-info { flex: 1; min-width: 0; }
  .contact-info .name {
    font-size: .97rem; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .contact-info .phone {
    font-size: .79rem; color: var(--phone); margin-top: 2px;
    font-family: monospace, 'Hind Siliguri'; letter-spacing: .3px;
  }

  /* Action buttons */
  .actions { display: flex; gap: 6px; flex-shrink: 0; align-items: center; }

  .btn-action {
    width: 38px; height: 38px; border-radius: 10px; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: transform .15s, filter .15s;
    text-decoration: none;
  }
  .btn-action:hover { transform: scale(1.1); filter: brightness(1.25); }
  .btn-call     { background: var(--call-bg); }
  .btn-whatsapp { background: var(--wa-bg); }

  /* Bottom bar */
  .bottom-bar {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: linear-gradient(to top, #0d1117 75%, transparent);
    padding: 14px 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 10;
  }
  .total-count { font-size: .83rem; color: var(--sub); }
  .total-count span { color: var(--text); font-weight: 700; }

  .btn-add {
    background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
    color: #0d1117; border: none; border-radius: 50px;
    padding: 11px 20px; font-family: 'Hind Siliguri', sans-serif;
    font-size: .93rem; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; gap: 7px;
    box-shadow: 0 4px 20px rgba(0,212,170,.38);
    transition: box-shadow .2s, transform .2s;
  }
  .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(0,212,170,.5); }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.78); backdrop-filter: blur(5px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px; padding: 28px 22px 22px;
    width: 92%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,.65);
    animation: slideUp .22s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(36px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal h2   { font-size: 1.15rem; margin-bottom: 3px; }
  .modal .sub { font-size: .8rem; color: var(--sub); margin-bottom: 20px; }

  .modal-field { margin-bottom: 12px; position: relative; }
  .modal-field input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 11px; padding: 12px 14px;
    font-family: 'Hind Siliguri', sans-serif; font-size: .93rem;
    color: var(--text); outline: none; transition: border-color .2s;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field input::placeholder { color: var(--sub); }
  .modal-field.has-prefix input { padding-left: 52px; }
  .modal-prefix {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    font-size: .88rem; color: var(--accent); font-weight: 700;
    pointer-events: none; font-family: monospace;
  }

  .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
  .btn-cancel {
    flex: 1; background: transparent; border: 1px solid var(--border);
    border-radius: 11px; padding: 11px;
    font-family: 'Hind Siliguri', sans-serif; font-size: .88rem;
    color: var(--sub); cursor: pointer; transition: border-color .2s, color .2s;
  }
  .btn-cancel:hover { border-color: #58a6ff; color: var(--text); }
  .btn-save {
    flex: 2; background: linear-gradient(135deg, var(--accent) 0%, #00b894 100%);
    border: none; border-radius: 11px; padding: 11px;
    font-family: 'Hind Siliguri', sans-serif; font-size: .93rem;
    font-weight: 700; color: #0d1117; cursor: pointer; transition: transform .15s;
  }
  .btn-save:hover { transform: scale(1.02); }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1e3a2f; color: var(--accent);
    border: 1px solid #2ea043; border-radius: 50px;
    padding: 10px 22px; font-size: .88rem; font-weight: 600;
    opacity: 0; transition: opacity .3s, transform .3s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Avatar palette */
  .av-1 { background: linear-gradient(135deg,#f97316,#ef4444); }
  .av-2 { background: linear-gradient(135deg,#a855f7,#ec4899); }
  .av-3 { background: linear-gradient(135deg,#06b6d4,#3b82f6); }
  .av-4 { background: linear-gradient(135deg,#10b981,#059669); }
  .av-5 { background: linear-gradient(135deg,#f59e0b,#f97316); }
  .av-6 { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
  .av-7 { background: linear-gradient(135deg,#14b8a6,#06b6d4); }
  .av-8 { background: linear-gradient(135deg,#f43f5e,#ec4899); }
</style>
</head>
<body>
<div class="app">

  <!-- Hero -->
  <div class="hero">
    <div class="hero-glow"></div>
    <h2>যোগাযোগঃ<span class="hero-dot"></span></h2>
  </div>

  <!-- Clock -->
  <div class="time-bar">
    <div id="clockDisplay">--:-- <span class="ampm">AM</span></div>
    <div class="date-info">
      <div class="dt"  id="dateDisplay">লোড হচ্ছে...</div>
      <div class="day" id="dayDisplay">--</div>
    </div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <span class="search-icon">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
    </span>
    <input type="text" id="searchInput" placeholder="নাম বা নাম্বার খুঁজুন..." oninput="filterContacts()">
  </div>

  <div class="section-label">সকল পরিচিত</div>
  <div class="contact-list" id="contactList"></div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="total-count">মোট <span id="totalCount">0</span> জন</div>
    <button class="btn-add" onclick="openModal('add')">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 5v14M5 12h14"/>
      </svg>
      নাম্বার যোগ করুন
    </button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" onclick="closeOnBackdrop(event)">
  <div class="modal">
    <h2 id="modalTitle">নতুন পরিচিত যোগ করুন</h2>
    <p class="sub">নিচে নাম ও নাম্বার লিখুন</p>
    <div class="modal-field">
      <input type="text" id="inputName" placeholder="পূর্ণ নাম লিখুন">
    </div>
    <div class="modal-field has-prefix">
      <span class="modal-prefix">+880</span>
      <input type="tel" id="inputPhone" placeholder="01XXXXXXXXX" maxlength="11">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">বাতিল</button>
      <button class="btn-save" id="btnSave" onclick="saveModal()">সংরক্ষণ করুন</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* Preset contacts (never editable) */
const PRESET = [
  { name:"বাকিবিল্লাহ ইমাম",    phone:"01779937436" },
  { name:"বেল্লাল ভাই জামায়াত", phone:"01828091382" },
  { name:"রহিম মোল্লা",          phone:"01715619146" },
  { name:"জর্বার ফিকর",          phone:"01706173449" },
  { name:"মতেলব নাজির",          phone:"01742793242" },
  { name:"আলতাফ",                phone:"01731813607" },
  { name:"আল আমিন",              phone:"01746306099" },
  { name:"দুলাল",                 phone:"01716114179" },
  { name:"ছগির খা",              phone:"01777407663" },
  { name:"কালু গরাম",            phone:"01712232501" },
  { name:"জাকারিয়া",             phone:"01792725543" },
  { name:"জাকারিয়া",             phone:"9638034072"  },
  { name:"সেকান্দার",             phone:""            },
  { name:"বাবুল ফহিকর",          phone:""            },
  { name:"জাহাঙ্গির আলাদার",     phone:"01724000014" },
];

const STORAGE_KEY = 'zakaria_user_contacts';
const AV = ['av-1','av-2','av-3','av-4','av-5','av-6','av-7','av-8'];

let userContacts = (function() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e) { return []; }
})();

let modalMode  = 'add';
let editingIdx = -1;

function saveStorage() { localStorage.setItem(STORAGE_KEY, JSON.stringify(userContacts)); }
function allContacts() { return PRESET.concat(userContacts); }

/* Phone formatter */
function fmtPhone(raw) {
  if (!raw) return '';
  var c = raw.replace(/\D/g,'');
  if (c.startsWith('880') && c.length > 10) return '+' + c;
  if (c.startsWith('0'))  return '+880' + c.slice(1);
  return '+880' + c;
}

/* Initials */
function initials(name) {
  var p = name.trim().split(/\s+/);
  return p.length >= 2 ? p[0][0] + p[1][0] : name.substring(0,2);
}

/* SVG icons as functions to avoid string issues */
function icoCall() {
  var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width','17'); s.setAttribute('height','17');
  s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','none');
  s.setAttribute('stroke','#2ea043'); s.setAttribute('stroke-width','2');
  s.setAttribute('stroke-linecap','round'); s.setAttribute('stroke-linejoin','round');
  var p = document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('d','M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.9 12.1 19.79 19.79 0 0 1 1.85 3.55 2 2 0 0 1 3.82 1.36h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9a16 16 0 0 0 6.88 6.88l.97-.97a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z');
  s.appendChild(p); return s;
}

function icoWa() {
  var s = document.createElementNS('http://www.w3.org/2000/svg','svg');
  s.setAttribute('width','17'); s.setAttribute('height','17');
  s.setAttribute('viewBox','0 0 24 24'); s.setAttribute('fill','#25d366');
  var p1 = document.createElementNS('http://www.w3.org/2000/svg','path');
  p1.setAttribute('d','M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z');
  var p2 = document.createElementNS('http://www.w3.org/2000/svg','path');
  p2.setAttribute('d','M12 0C5.373 0 0 5.373 0 12c0 2.119.554 4.108 1.523 5.837L.057 23.428a.5.5 0 0 0 .608.61l5.7-1.444A11.95 11.95 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22a9.95 9.95 0 0 1-5.144-1.426l-.369-.219-3.827.97.998-3.74-.24-.386A9.963 9.963 0 0 1 2 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z');
  s.appendChild(p1); s.appendChild(p2); return s;
}

/* Render */
function renderContacts(list) {
  var el  = document.getElementById('contactList');
  var all = allContacts();
  el.innerHTML = '';

  list.forEach(function(c, i) {
    var gIdx   = all.indexOf(c);
    var isUser = gIdx >= PRESET.length;
    var uIdx   = isUser ? gIdx - PRESET.length : -1;
    var phone  = fmtPhone(c.phone);
    var phTxt  = phone || '(নাম্বার নেই)';
    var callHr = phone ? 'tel:' + phone : 'javascript:void(0)';
    var waHr   = phone ? 'https://wa.me/' + phone.replace('+','') : 'javascript:void(0)';

    /* Card */
    var card = document.createElement('div');
    card.className = 'contact-card' + (isUser ? ' user-added' : '');
    if (isUser) {
      card.addEventListener('click', (function(idx) {
        return function() { openModal('edit', idx); };
      })(uIdx));
    }

    /* Serial */
    var serial = document.createElement('span');
    serial.className = 'serial';
    serial.textContent = i + 1;
    card.appendChild(serial);

    /* Avatar */
    var av = document.createElement('div');
    av.className = 'avatar ' + AV[gIdx % AV.length];
    av.textContent = initials(c.name);
    card.appendChild(av);

    /* Info */
    var info = document.createElement('div');
    info.className = 'contact-info';
    var nameEl = document.createElement('div');
    nameEl.className = 'name';
    nameEl.textContent = c.name;
    var phoneEl = document.createElement('div');
    phoneEl.className = 'phone';
    phoneEl.textContent = phTxt;
    info.appendChild(nameEl);
    info.appendChild(phoneEl);
    card.appendChild(info);

    /* Actions */
    var actions = document.createElement('div');
    actions.className = 'actions';
    actions.addEventListener('click', function(e) { e.stopPropagation(); });

    var callBtn = document.createElement('a');
    callBtn.className = 'btn-action btn-call';
    callBtn.href = callHr;
    callBtn.title = 'কল করুন';
    callBtn.appendChild(icoCall());
    actions.appendChild(callBtn);

    var waBtn = document.createElement('a');
    waBtn.className = 'btn-action btn-whatsapp';
    waBtn.href = waHr;
    waBtn.target = '_blank';
    waBtn.rel = 'noopener';
    waBtn.title = 'WhatsApp';
    waBtn.appendChild(icoWa());
    actions.appendChild(waBtn);

    card.appendChild(actions);
    el.appendChild(card);
  });

  document.getElementById('totalCount').textContent = all.length;
}

function filterContacts() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  var list = q
    ? allContacts().filter(function(c) { return c.name.toLowerCase().includes(q) || c.phone.includes(q); })
    : allContacts();
  renderContacts(list);
}

/* Modal */
function openModal(mode, uIdx) {
  modalMode  = mode;
  editingIdx = uIdx !== undefined ? uIdx : -1;

  if (mode === 'edit') {
    var c = userContacts[uIdx];
    document.getElementById('modalTitle').textContent = 'পরিচিত সম্পাদনা করুন';
    document.getElementById('btnSave').textContent    = 'আপডেট করুন';
    document.getElementById('inputName').value  = c.name;
    document.getElementById('inputPhone').value = c.phone.replace(/^\+?880/,'');
  } else {
    document.getElementById('modalTitle').textContent = 'নতুন পরিচিত যোগ করুন';
    document.getElementById('btnSave').textContent    = 'সংরক্ষণ করুন';
    document.getElementById('inputName').value  = '';
    document.getElementById('inputPhone').value = '';
  }
  document.getElementById('modalOverlay').classList.add('open');
  setTimeout(function() { document.getElementById('inputName').focus(); }, 80);
}

function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); }
function closeOnBackdrop(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

function saveModal() {
  var name  = document.getElementById('inputName').value.trim();
  var phone = document.getElementById('inputPhone').value.trim();
  if (!name) {
    var el = document.getElementById('inputName');
    el.style.borderColor = '#f87171';
    el.animate([{transform:'translateX(-5px)'},{transform:'translateX(5px)'},{transform:'translateX(0)'}],{duration:180});
    setTimeout(function(){ el.style.borderColor=''; }, 700);
    el.focus(); return;
  }
  if (modalMode === 'edit') {
    userContacts[editingIdx] = { name: name, phone: phone };
    showToast('✓ আপডেট সম্পন্ন হয়েছে');
  } else {
    userContacts.push({ name: name, phone: phone });
    showToast('✓ নতুন পরিচিত সংরক্ষিত হয়েছে');
  }
  saveStorage();
  renderContacts(allContacts());
  closeModal();
}

/* Toast */
function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 2600);
}

/* Clock */
var BN_MO  = ['জানু','ফেব্রু','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টে','অক্টো','নভে','ডিসে'];
var BN_DAY = ['রবিবার','সোমবার','মঙ্গলবার','বুধবার','বৃহস্পতিবার','শুক্রবার','শনিবার'];

function tick() {
  var n = new Date();
  var h = n.getHours(), m = n.getMinutes();
  var ap = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  document.getElementById('clockDisplay').innerHTML =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ' <span class="ampm">' + ap + '</span>';
  document.getElementById('dateDisplay').textContent =
    n.getDate() + ' ' + BN_MO[n.getMonth()] + ', ' + n.getFullYear();
  document.getElementById('dayDisplay').textContent = BN_DAY[n.getDay()];
}

tick();
setInterval(tick, 1000);
renderContacts(allContacts());
</script>
</body>
</html>
